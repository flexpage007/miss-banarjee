<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link List</title>
    <style>
        :root {
            --bg: #070b18;
            --ink: #f6fbff;
            --muted: #adc2d4;
            --panel: rgba(12, 20, 42, 0.76);
            --blue: #59b8ff;
            --red: #ff5f74;
            --pink: #ff8bd6;
            --gold: #ffd778;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 8%, rgba(89, 184, 255, 0.08), transparent 20rem),
                linear-gradient(180deg, #070b18 0%, #0a142b 60%);
            padding: 36px 18px;
        }

        .page {
            width: min(980px, calc(100% - 32px));
            margin: 0 auto
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 2.2rem;
            margin: 0;
            color: var(--gold)
        }

        .lead {
            color: var(--muted);
            font-size: 0.98rem
        }

        .notice {
            margin-top: 12px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 720px
        }

        .notice strong {
            color: var(--ink);
            font-weight: 800
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            margin-top: 18px
        }

        .card {
            /* padding: 12px; */
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)), var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
            min-height: 90px;
            display: flex
        }

        /* Make the link fill the card for a large glossy button */
        .card a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 900;
            padding: 14px 18px;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .card a::after {
            content: '';
            position: absolute;
            left: 8px;
            right: 8px;
            top: 8px;
            height: 52%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.06));
            mix-blend-mode: overlay;
            opacity: 0.95;
            transform: translateY(-6px);
            transition: transform 260ms ease;
            pointer-events: none;
            border-radius: 10px;
        }

        .card a:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 22px 46px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.14);
            filter: brightness(1.04);
        }

        .card a:active {
            transform: translateY(-2px) scale(0.995)
        }

        /* Color variants matching coupons */
        .card.blue {
            border-color: rgba(89, 184, 255, 0.44);
            background: linear-gradient(135deg, rgba(89, 184, 255, 0.28), rgba(255, 255, 255, 0.02)), rgba(12, 26, 52, 0.9)
        }

        .card.blue a {
            background: linear-gradient(180deg, rgba(89, 184, 255, 0.12), rgba(255, 255, 255, 0.02));
        }

        .card.red {
            border-color: rgba(255, 95, 116, 0.48);
            background: linear-gradient(135deg, rgba(255, 95, 116, 0.26), rgba(255, 255, 255, 0.02)), rgba(42, 12, 28, 0.88)
        }

        .card.red a {
            background: linear-gradient(180deg, rgba(255, 95, 116, 0.12), rgba(255, 255, 255, 0.02));
        }

        .card.pink {
            border-color: rgba(255, 139, 214, 0.5);
            background: linear-gradient(135deg, rgba(255, 139, 214, 0.28), rgba(255, 255, 255, 0.02)), rgba(47, 18, 52, 0.88)
        }

        .card.pink a {
            background: linear-gradient(180deg, rgba(255, 139, 214, 0.12), rgba(255, 255, 255, 0.02));
        }

        .card.white {
            border-color: rgba(255, 255, 255, 0.72);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(226, 240, 255, 0.76)), rgba(255, 255, 255, 0.88);
            color: #101827
        }

        .card.white a {
            background: linear-gradient(180deg, #ffffff, #f0f6ff);
            color: #06101f;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(16, 24, 39, 0.06)
        }

        @media(max-width:920px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr))
            }
        }

        @media(max-width:640px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr))
            }

            .grid {
                grid-template-columns: 1fr
            }

            .header {
                flex-direction: column;

                .grid {
                    grid-template-columns: 1fr
                }

                .header {
                    flex-direction: column;
                    align-items: flex-start
                }
            }

            /* Glass texture + particles + petals containers */
            .page {
                position: relative;
                z-index: 1
            }

            /* subtle frosted rim on each card */
            .card {
                position: relative;
                overflow: hidden
            }

            .card::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 14px;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
                pointer-events: none;
                mix-blend-mode: screen;
                opacity: 0.9
            }

            .card {
                backdrop-filter: blur(6px) saturate(120%)
            }

            .particles,
            .petals {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 3;
                overflow: hidden
            }

            .particles {
                z-index: 0
            }

            .petals {
                z-index: 4
            }

            .particles span {
                position: absolute;
                border-radius: 50%;
                width: var(--s, 8px);
                height: var(--s, 8px);
                background: radial-gradient(circle, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.22));
                opacity: 0.06;
                transform: translateY(0);
                animation: floatParticle var(--d, 10s) linear infinite;
                filter: blur(0.6px)
            }

            @keyframes floatParticle {
                0% {
                    transform: translateY(20vh) scale(var(--scale, 1));
                    opacity: 0
                }

                10% {
                    opacity: 0.06
                }

                80% {
                    opacity: 0.08
                }

                100% {
                    transform: translateY(-20vh) scale(var(--scale, 1));
                    opacity: 0
                }
            }

            .petals span {
                position: absolute;
                width: 18px;
                height: 12px;
                background: linear-gradient(135deg, rgba(255, 220, 230, 0.95), rgba(255, 150, 200, 0.9));
                border-radius: 70% 30% 60% 40%;
                transform-origin: center;
                opacity: 0.95;
                filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.18));
                animation: fall var(--t, 8s) linear infinite
            }

            @keyframes fall {
                0% {
                    transform: translateY(-10vh) rotate(0deg) translateX(0);
                    opacity: 0
                }

                10% {
                    opacity: 1
                }

                100% {
                    transform: translateY(120vh) rotate(360deg) translateX(var(--x, 50px));
                    opacity: 0.95
                }
            }

        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div>
                <h1>🎟️ Love Links</h1>
                <div class="lead">A cozy list of pages and the coupon vault — styled to match your coupons.</div>
                <div class="notice"><strong>Use QR codes only:</strong> if any QR is lost, don't worry — tell me and
                    I'll replace it with extra hugs 💙</div>
            </div>
        </div>

        <div class="grid">
            <div class="card white"><a href="coupons.html">Coupons</a></div>
            <div class="card blue"><a href="story.html">Main Page</a></div>
            <div class="card red"><a href="index.html">Page 1</a></div>
            <div class="card pink"><a href="index1.html">Page 2</a></div>
            <div class="card white"><a href="index2.html">Page 3</a></div>
            <div class="card blue"><a href="index3.html">Page 4</a></div>
            <div class="card red"><a href="index4.html">Page 5</a></div>
            <div class="card pink"><a href="index5.html">Page 6</a></div>
            <div class="card white"><a href="index6.html">Page 7</a></div>
            <div class="card blue"><a href="index7.html">Page 8</a></div>
            <div class="card red"><a href="index8.html">Page 9</a></div>
            <div class="card pink"><a href="index9.html">Page 10</a></div>
            <div class="card white"><a href="index-main.html">Page 11</a></div>
            <div class="card blue"><a href="index-main-black.html">Page 12</a></div>
        </div>

        <div class="particles" aria-hidden="true"></div>
        <div class="petals" aria-hidden="true"></div>

        <script>
            (function () {
                const pC = document.querySelector('.particles');
                const petalC = document.querySelector('.petals');

                if (pC) {
                    for (let i = 0; i < 28; i++) {
                        const el = document.createElement('span');
                        const s = (Math.random() * 8 + 4).toFixed(2);
                        el.style.setProperty('--s', s + 'px');
                        el.style.left = (Math.random() * 100) + '%';
                        el.style.top = (Math.random() * 100) + '%';
                        el.style.setProperty('--d', (Math.random() * 10 + 6).toFixed(2) + 's');
                        el.style.setProperty('--scale', (Math.random() * 0.9 + 0.6).toFixed(2));
                        pC.appendChild(el);
                    }
                }

                if (petalC) {
                    for (let i = 0; i < 12; i++) {
                        const el = document.createElement('span');
                        const left = (Math.random() * 110 - 5).toFixed(2);
                        el.style.left = left + '%';
                        el.style.setProperty('--t', (Math.random() * 6 + 6).toFixed(2) + 's');
                        el.style.setProperty('--x', (Math.random() * 300 - 150).toFixed(2) + 'px');
                        el.style.transform = 'rotate(' + (Math.random() * 360).toFixed(2) + 'deg)';
                        el.style.width = (10 + Math.random() * 26).toFixed(2) + 'px';
                        el.style.height = (6 + Math.random() * 20).toFixed(2) + 'px';
                        petalC.appendChild(el);
                    }
                }
            })();
        </script>
    </div>
</body>

</html>
